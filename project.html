<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surat Cinta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Animasi hati jatuh */
        @keyframes jatuh {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Animasi amplop goyang */
        @keyframes goyang {
            0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
            50% { transform: translate(-50%, -50%) rotate(2deg); }
        }

        /* Animasi tulisan klik berdenyut */
        @keyframes denyut {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Animasi buka amplop & muncul kertas */
        @keyframes bukaAmplop {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
        }

        @keyframes munculKertas {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            60% { transform: translate(-50%, -50%) scale(1.03); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .hati-jatuh {
            position: absolute;
            color: #ff4477;
            font-size: 18px;
            animation: jatuh 7s linear infinite;
        }

        .amplop {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 130px;
            background: #f8e8d9;
            border-radius: 6px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            animation: goyang 3s ease-in-out infinite;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .amplop:active {
            transform: translate(-50%, -50%) scale(0.96);
        }

        .amplop.buka {
            animation: bukaAmplop 0.6s ease forwards;
            pointer-events: none;
        }

        .tutup-amplop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #f0d9c3;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            border-radius: 6px 6px 0 0;
        }

        .hati-amplop {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #ff3366;
        }

        .teks-klik {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: 500;
            color: #cc3366;
            letter-spacing: 1px;
            animation: denyut 2.5s ease-in-out infinite;
            white-space: nowrap;
            z-index: 9;
            transition: opacity 0.3s ease;
        }

        .teks-klik.sembunyi {
            opacity: 0;
            pointer-events: none;
        }

        .kertas-surat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 88%;
            max-width: 320px;
            height: 75%;
            background: #fffdf8;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            padding: 24px 20px;
            opacity: 0;
            z-index: 11;
            overflow-y: auto; /* ✅ Bisa digulir ke atas-bawah */
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* ✅ Lancar di HP */
        }

        /* Gaya scroll biar tetap estetik */
        .kertas-surat::-webkit-scrollbar {
            width: 4px;
        }
        .kertas-surat::-webkit-scrollbar-track {
            background: #f8f2e9;
        }
        .kertas-surat::-webkit-scrollbar-thumb {
            background: #ffb3cc;
            border-radius: 2px;
        }

        .kertas-surat.muncul {
            animation: munculKertas 0.8s ease 0.5s forwards;
        }

        .isi-surat {
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            line-height: 1.7;
            color: #442222;
            text-align: left;
            white-space: pre-line;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hati jatuh latar -->
    <script>
        for (let i = 0; i < 30; i++) {
            const hati = document.createElement('div');
            hati.className = 'hati-jatuh';
            hati.textContent = '❤️';
            hati.style.left = `${Math.random() * 100}vw`;
            hati.style.animationDelay = `${Math.random() * 7}s`;
            hati.style.fontSize = `${Math.random() * 12 + 14}px`;
            document.body.appendChild(hati);
        }
    </script>

    <!-- Kotak utama -->
    <div style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 85vw;
        max-width: 380px;
        height: 60vh;
        max-height: 450px;
        border: 4px solid #000000;
        border-radius: 16px;
        background: #ffe6f2;
        position: relative;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        overflow: hidden;
    ">

        <!-- Amplop -->
        <div class="amplop" id="amplop">
            <div class="tutup-amplop"></div>
            <div class="hati-amplop">❤️</div>
        </div>

        <!-- Tulisan klik -->
        <div class="teks-klik" id="teksKlik">
            Klik Surat Ini
        </div>

        <!-- Kertas surat -->
        <div class="kertas-surat" id="kertasSurat">
            <div class="isi-surat" id="isiSurat"></div>
        </div>

    </div>

    <script>
        const amplop = document.getElementById('amplop');
        const teksKlik = document.getElementById('teksKlik');
        const kertasSurat = document.getElementById('kertasSurat');
        const isiSurat = document.getElementById('isiSurat');

        // ✅ Isi surat LENGKAP sesuai pesan kamu
        const pesan = `Halo Mel 💌

Aku kan udah suka kamu hampir 4 tahun, dan kamu juga tau kalo aku udah suka kamu dari lama. Nah aku ngerasa kalo kamu kayak nya juga suka aku, ga tau aku yang ke pedean atau emang bener.

Tapi kalo emang kamu suka aku, bole ga kasih aku kesempatan buat sama kamu? Aku janji bakal jaga rahasia ini. Kalo emang kamu mau bilang ya ke aku, kalo emang gak mau aku berusaha untuk menjauh.

Dan kamu tau kenapa aku nekat bilang ini? Karna aku merasa aku kayak ke gantung di hubungan yang ga tau arah nya ke mana.`;

        // Fungsi saat diklik
        amplop.addEventListener('click', () => {
            amplop.classList.add('buka');
            teksKlik.classList.add('sembunyi');

            setTimeout(() => {
                kertasSurat.classList.add('muncul');
                ketikTeks();
            }, 700);
        });

        // Efek tulisan muncul huruf demi huruf
        function ketikTeks() {
            let i = 0;
            const kecepatan = 30; // makin kecil makin cepat
            function tulis() {
                if (i < pesan.length) {
                    isiSurat.innerHTML += pesan.charAt(i);
                    i++;
                    setTimeout(tulis, kecepatan);
                }
            }
            tulis();
        }
    </script>

</body>
</html>
